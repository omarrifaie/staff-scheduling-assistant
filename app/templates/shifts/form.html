{% extends 'base.html' %}
{% block title %}{% if shift %}Edit{% else %}New{% endif %} Shift | Staff Scheduling Assistant{% endblock %}

{% block content %}
<h1>{% if shift %}Edit shift{% else %}New shift{% endif %}</h1>

<form method="post" class="form">
    <div class="form-grid">
        <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" name="date" required
                   value="{{ shift.date.isoformat() if shift else '' }}">
        </div>
        <div class="form-group">
            <label for="required_role">Required role</label>
            <select id="required_role" name="required_role" required>
                {% for r in roles %}
                    <option value="{{ r }}" {% if shift and shift.required_role == r %}selected{% endif %}>{{ r }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="start_time">Start time</label>
            <input type="time" id="start_time" name="start_time" required
                   value="{{ shift.start_time.strftime('%H:%M') if shift else '' }}">
        </div>
        <div class="form-group">
            <label for="end_time">End time</label>
            <input type="time" id="end_time" name="end_time" required
                   value="{{ shift.end_time.strftime('%H:%M') if shift else '' }}">
        </div>
        <div class="form-group">
            <label for="min_staff">Minimum staff</label>
            <input type="number" id="min_staff" name="min_staff" min="1" max="20"
                   value="{{ shift.min_staff if shift else 1 }}">
        </div>
        <div class="form-group form-group-full">
            <label for="notes">Notes</label>
            <input type="text" id="notes" name="notes" maxlength="250"
                   value="{{ shift.notes if shift else '' }}">
        </div>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">
            {% if shift %}Save changes{% else %}Create shift{% endif %}
        </button>
        <a href="{{ url_for('shifts.index') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
